name: enforcement-check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:

# Cancel in-progress runs for the same PR on new pushes
concurrency:
  group: enforcement-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Secrets scan ─────────────────────────────────────────────────────────
  secrets-scan:
    name: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks on changed files
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Scan only the commits in this PR, not the full history
          args: >-
            detect
            --source .
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
            --redact
            --no-git=false
            --exit-code 1

  # ─── 2. Commit message format ────────────────────────────────────────────────
  commit-format:
    name: commit-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Conventional commit pattern: type(scope)?: description
          # Allowed types per Angular convention
          TYPES="build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test"
          PATTERN="^(${TYPES})(\([a-z0-9_/-]+\))?: .{1,100}$"

          FAIL=0

          while IFS= read -r sha; do
            msg=$(git log --format=%s -n 1 "$sha")
            full=$(git log --format=%B -n 1 "$sha")

            # Check subject line format
            if ! echo "$msg" | grep -qP "$PATTERN"; then
              echo "::error::Commit $sha has invalid subject: '$msg'"
              echo "  Expected format: type(scope)?: description"
              echo "  Allowed types: ${TYPES}"
              FAIL=1
            fi

            # Block AI attribution footers
            if echo "$full" | grep -qiP "^Co-Authored-By:.*claude|^Generated with Claude"; then
              echo "::error::Commit $sha contains AI attribution footer. Remove it before merging."
              FAIL=1
            fi

            # Block WIP commits on protected branches
            if echo "$msg" | grep -qiP "^\s*wip\b"; then
              echo "::error::Commit $sha is a WIP commit. Squash or rename before merging."
              FAIL=1
            fi

          done < <(git log --format=%H "${BASE}..${HEAD}")

          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi

          echo "All commit messages are valid."

  # ─── 3. Python lint (ruff) ───────────────────────────────────────────────────
  lint-python:
    name: lint-python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed Python files
        id: changed
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          FILES=$(git diff --name-only --diff-filter=ACMR "${BASE}..${HEAD}" \
            | grep -E '\.(py)$' \
            | grep -E '^(apps/api/|ml/)' \
            || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.changed.outputs.files != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        if: steps.changed.outputs.files != ''
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ruff-${{ runner.os }}-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt') }}
          restore-keys: pip-ruff-${{ runner.os }}-

      - name: Install ruff
        if: steps.changed.outputs.files != ''
        run: pip install ruff

      - name: Run ruff on changed files
        if: steps.changed.outputs.files != ''
        shell: bash
        run: |
          echo "${{ steps.changed.outputs.files }}" | xargs ruff check --output-format=github

      - name: No Python files changed
        if: steps.changed.outputs.files == ''
        run: echo "No Python files changed in apps/api/ or ml/ — skipping ruff."

  # ─── 4. TypeScript lint (ESLint) ────────────────────────────────────────────
  lint-typescript:
    name: lint-typescript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed TypeScript files
        id: changed
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          FILES=$(git diff --name-only --diff-filter=ACMR "${BASE}..${HEAD}" \
            | grep -E '\.(ts|tsx)$' \
            | grep -E '^(packages/score-editor/|apps/native/score-editor/)' \
            || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.changed.outputs.files != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        if: steps.changed.outputs.files != ''
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        if: steps.changed.outputs.files != ''
        run: pnpm install --frozen-lockfile

      - name: Cache ESLint
        if: steps.changed.outputs.files != ''
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('**/eslint.config.*', '**/.eslintrc.*', '**/package-lock.json') }}
          restore-keys: eslint-${{ runner.os }}-

      - name: Run ESLint on changed files
        if: steps.changed.outputs.files != ''
        shell: bash
        run: |
          echo "${{ steps.changed.outputs.files }}" \
            | xargs npx eslint --cache --cache-location .eslintcache --no-error-on-unmatched-pattern

      - name: No TypeScript files changed
        if: steps.changed.outputs.files == ''
        run: echo "No TypeScript files changed in score-editor paths — skipping ESLint."

  # ─── 5. Block .pt model files ────────────────────────────────────────────────
  model-files:
    name: model-files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for model weight files
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          FOUND=$(git diff --name-only --diff-filter=A "${BASE}..${HEAD}" \
            | grep -E '\.(pt|pth|onnx|safetensors|bin)$' \
            || true)

          if [ -n "$FOUND" ]; then
            echo "::error::The following model weight files were added to the repo:"
            echo "$FOUND" | while read -r f; do echo "  - $f"; done
            echo ""
            echo "Model weights must NOT be committed. Use a model registry (S3, HuggingFace Hub, etc.)."
            exit 1
          fi

          echo "No model weight files detected."

  # ─── 6. Block .env files ─────────────────────────────────────────────────────
  env-files:
    name: env-files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for tracked .env files
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          FOUND=$(git diff --name-only --diff-filter=A "${BASE}..${HEAD}" \
            | grep -E '(^|/)\.env(\.|$)' \
            || true)

          if [ -n "$FOUND" ]; then
            echo "::error::The following .env files are being tracked by git:"
            echo "$FOUND" | while read -r f; do echo "  - $f"; done
            echo ""
            echo ".env files must never be committed. Add them to .gitignore and rotate any exposed secrets."
            exit 1
          fi

          echo "No .env files detected."
